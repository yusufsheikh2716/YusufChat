services:
  # ── Backend: Java WebSocket Server ────────────────────────────────────────
  - type: web
    name: yusufchat-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /

  # ── Frontend: Static Site ──────────────────────────────────────────────────
  - type: web
    name: yusufchat-web
    runtime: static
    staticPublishPath: ./web
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
