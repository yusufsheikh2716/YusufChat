services:
  # ── Frontend: Static Site (FREE — no credit card required) ─────────────────
  - type: web
    name: yusufchat-web
    runtime: static
    staticPublishPath: ./web
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
