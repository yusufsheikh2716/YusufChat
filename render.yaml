services:
  # ── Backend: Java WebSocket Server ────────────────────────────────────────
  - type: web
    name: yusufchat-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /

  # ── Frontend: Static Site ──────────────────────────────────────────────────
  - type: static
    name: yusufchat-web
    staticPublishPath: ./web
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
